name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

# Permissions the deploy-pages action needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; let a newer push supersede an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure Pages
        # enablement: true turns on Pages (source = GitHub Actions) on first run,
        # so no manual repo-settings step is required.
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Build
        # base-href must match the repo name so assets resolve under /portfolio/.
        run: npx ng build --configuration production --base-href /portfolio/

      - name: SPA fallback
        # GitHub Pages serves 404.html for unknown paths; reuse index.html so
        # client-side routes deep-link correctly.
        run: cp dist/portfolio/browser/index.html dist/portfolio/browser/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/portfolio/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
